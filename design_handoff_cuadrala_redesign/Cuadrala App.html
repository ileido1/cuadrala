<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuádrala — Rediseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #06080d; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  /* ── Cuádrala design tokens ─────────────────────────────── */
  .cz {
    --green: #17A34A;
    --lime: #C5FF00;
    --green-bg: color-mix(in srgb, var(--green) 15%, transparent);
    --radius-btn: 12px;
    --radius-card: 18px;
  }
  .cz[data-theme="dark"] {
    --bg: #0B1220;
    --bg-2: #0F172A;
    --surface: #131C2E;
    --surface-2: #1B2740;
    --line: rgba(255,255,255,0.09);
    --line-strong: rgba(255,255,255,0.18);
    --text: #F8FAFC;
    --muted: #94A3B8;
    --muted-2: #5C6B85;
    --map: #0c1524;
  }
  .cz[data-theme="light"] {
    --bg: #F3F4F6;
    --bg-2: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #F3F4F6;
    --line: #E5E7EB;
    --line-strong: #CBD2DC;
    --text: #0F172A;
    --muted: #64748B;
    --muted-2: #94A3B8;
    --map: #E6EBF1;
  }
  .cz textarea::placeholder, .cz input::placeholder { color: var(--muted-2); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
